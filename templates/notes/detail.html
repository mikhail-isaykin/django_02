{% extends 'base.html' %}

{% block content %}
    <div class="card">
        <div class="card-body">
            <h3 class="card-title">{{ note.title }}</h3>
            <p class="card-text">{{ note.body }}</p>
            <small class="text-muted">Создано: {{ note.created_at|date:"d.m.Y H:i" }}</small>
        </div>
    </div>
    <br>
    <a href="{% url 'notes_list' %}">← Назад к списку</a>
    <a href="{% url 'note_edit' note.id %}" class="btn btn-warning">✏️ Редактировать</a>
    <a href="{% url 'note_delete' note.id %}" class="btn btn-danger ms-2">🗑️ Удалить</a>
{% endblock %}
