<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] pointer-events-none"
     x-data="{ visible: false, message: '' }"
     @show-toast.window="message = $event.detail; visible = true; setTimeout(() => visible = false, 2000)">
  <div class="bg-white text-black px-6 py-3 text-xs font-medium uppercase tracking-widest transition-all duration-400"
       x-show="visible"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-4"
       x-text="message"
       style="display:none;">
  </div>
</div>
