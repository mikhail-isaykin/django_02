<header class="sticky top-0 z-40 w-full bg-[#f5f5f5] text-black border-none">
  <div class="flex h-20 items-center justify-between px-6 md:px-10">

    {# Левая часть: Навигация (desktop) #}
    <nav class="hidden flex-1 md:flex gap-6 text-sm font-medium">
      <a href="{% url 'catalog:index' %}" class="hover:text-gray-500 transition-colors capitalize">Sunglasses</a>
      <a href="{% url 'catalog:index' %}" class="hover:text-gray-500 transition-colors capitalize">Glasses</a>
      <a href="#" class="hover:text-gray-500 transition-colors capitalize">Collections</a>
      <a href="#" class="hover:text-gray-500 transition-colors capitalize">Stores</a>
      <a href="#" class="hover:text-gray-500 transition-colors capitalize">Explore</a>
    </nav>

    {# Центральная часть: Логотип #}
    <div class="flex-1 flex justify-center">
      <a href="{% url 'catalog:index' %}" class="text-3xl font-serif tracking-widest text-center"
        style="font-family: 'Times New Roman', Times, serif;">
        EYESHOP
      </a>
    </div>

    {# Правая часть: поиск, аккаунт, корзина #}
    <div class="flex flex-1 items-center justify-end gap-6 text-sm font-medium">
      <button class="hover:text-gray-500 transition-colors flex items-center gap-2">
        <span>Search</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </button>
      <button class="hover:text-gray-500 transition-colors hidden md:flex items-center gap-2">
        <span>Account</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </button>

      {# Кнопка корзины — открывает Alpine.js сайдбар #}
      <button class="hover:text-gray-500 transition-colors flex items-center gap-2" @click="openCart()">
        <span>Bag</span>
        <div class="relative">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
          <span
            class="absolute -top-1 -right-2 text-[10px] w-3 h-3 flex items-center justify-center bg-black text-white rounded-full"
            x-show="cartCount > 0" x-text="cartCount"></span>
        </div>
      </button>
    </div>

  </div>
</header>
