{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h2 class="mb-0">➕ Пополнение счёта</h2>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Текущий баланс: <strong class="text-success">{{ bank_account.balance }} ₽</strong></p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Сумма пополнения</label>
                            <input type="number" name="amount" class="form-control" min="1" placeholder="Введите сумму">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Пополнить</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center text-muted small py-3">
                    <a href="{% url 'homepage:bank_account' %}">← Назад к счёту</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
