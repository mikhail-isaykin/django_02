<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form method='post'>
    {% csrf_token %}
    {{ formset.management_form }}
    {{ formset.non_form_errors }}
    {% for form in formset %}
      {{ form.errors }}
      {{ form.as_p }}
    {% endfor %}
    <button type='submit'>Отправить</button>
  </form>
</body>
</html>
