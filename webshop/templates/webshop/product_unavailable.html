<h1>Продукт временно отсутствует</h1>
{% if product_sku %}
    <p>К сожалению, продукт с SKU: <strong>{{ product_sku }}</strong> сейчас недоступен или закончился на складе.</p>
{% else %}
    <p>К сожалению, запрошенный продукт сейчас недоступен или закончился на складе.</p>
{% endif %}
<p><a href="{% url 'product_search' %}">Попробуйте найти другие продукты</a></p>
