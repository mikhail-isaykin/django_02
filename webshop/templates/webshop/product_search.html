<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск товаров</title>
</head>
<body>
    <h1>Поиск товаров</h1>

    <form method="get">
        {{ form.as_p }}
        <button type="submit">Поиск</button>
    </form>

    <h2>Результаты поиска:</h2>
    <ul>
        {% for product in products %}
            <li>{{ product.name }} — {{ product.price }} рублей</li>
        {% empty %}
            <li>Ничего не найдено.</li>
        {% endfor %}
    </ul>
</body>
</html>
